# =============================================================================
# TEMPLATE de secrets — NÃO COMITAR VALORES REAIS.
# Em produção, gerencie via Sealed Secrets / SOPS / Vault e injete no cluster.
# Este arquivo serve apenas de referência das chaves esperadas.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: afeto-secrets
  namespace: afeto-sac
type: Opaque
stringData:
  DATABASE_URL: "postgresql://..."
  DIRECT_URL: "postgresql://..."
  JWT_SECRET: "<gerar: openssl rand -hex 32>"
  # Cofre de criptografia dos segredos por organização (Lote 2) — OBRIGATÓRIO
  ENCRYPTION_KEY: "<gerar: openssl rand -hex 32>"
  # Redis para rate limiting distribuído e filas (multi-instância)
  REDIS_URL: "redis://redis:6379"
  # WhatsApp: credenciais agora são POR ORGANIZAÇÃO (cifradas no banco).
  # As variáveis abaixo são apenas fallback global opcional de desenvolvimento.
  WHATSAPP_APP_SECRET: ""
  WHATSAPP_ACCESS_TOKEN: ""
  WHATSAPP_PHONE_NUMBER_ID: ""
