name: CI/CD - Testes e Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # TESTES DO BACKEND
  # ==========================================
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    env:
      DATABASE_URL: "file:./test.db"
      JWT_SECRET: "test-secret-key"
      NODE_ENV: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./server/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run tests
      run: npm test -- --coverage --coverageReporters=text-summary

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./server/coverage/lcov.info
        flags: backend
        name: backend-coverage

  # ==========================================
  # TESTES DO FRONTEND
  # ==========================================
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./client/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run tests
      run: npm test || true

  # ==========================================
  # TESTES E2E COM PLAYWRIGHT
  # ==========================================
  test-e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    defaults:
      run:
        working-directory: ./client

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./client/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: ./client/playwright-report/
        retention-days: 30

  # ==========================================
  # LINTER E TYPE CHECK
  # ==========================================
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Lint Backend
      working-directory: ./server
      run: |
        npm ci
        npm run lint || true

    - name: Lint Frontend
      working-directory: ./client
      run: |
        npm ci
        npm run lint || true

  # ==========================================
  # PRÉ-GO-LIVE CHECK (ambiente de produção)
  # ==========================================
  precheck:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, lint]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./server

    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
      WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
      WHATSAPP_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./server/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run precheck
      run: npm run precheck

  # ==========================================
  # DEPLOY (apenas na branch main)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: [precheck]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Build frontend
      working-directory: ./client
      run: npm ci && npm run build

    - name: Deploy to Netlify
      uses: nwtgck/actions-netlify@v2.0
      with:
        publish-dir: './client/dist'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deploy from GitHub Actions"
        enable-pull-request-comment: true
        enable-commit-comment: true
        overwrites-pull-request-comment: true
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      timeout-minutes: 5

  # ==========================================
  # SMOKE TEST PÓS-DEPLOY
  # ==========================================
  smoke:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./server

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./server/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Wait for deploy to be live
      run: sleep 30

    - name: Run smoke test
      run: npm run smoke
      env:
        BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
        SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
        SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        SMOKE_TIMEOUT_MS: "15000"
