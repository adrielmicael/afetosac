[build]
  # publish e functions são relativos à raiz do repositório (sem base)
  publish = "client/dist"
  # Netlify instala só as deps da raiz (e do server via postinstall). É preciso
  # instalar as deps do client explicitamente (--include=dev garante tsc/vite,
  # que são devDependencies) antes de buildar.
  command = "npm install --prefix client --include=dev --legacy-peer-deps && npm run build:client && cd server && npx prisma generate"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["src/generated/prisma/**"]

# Checklist de pre-go-live (bloqueia build se variáveis críticas ausentes)
[build.processing]
  skip_processing = false

# API redirects
#
# IMPORTANTE: a função serverless usa o MESMO bootstrap (createApp) do backend
# stateful, então tem paridade de segurança. Porém Socket.io (tempo real) e
# rate limiting persistente NÃO funcionam em serverless efêmero.
#
# Produção recomendada: hospedar o backend stateful (Docker/K8s em k8s/) e
# apontar /api/* para ele via variável API_BACKEND_URL, mantendo o Netlify
# apenas para o frontend. Ex.:
#   to = "https://api.seudominio.com/api/:splat"
#
# Fallback serverless (sem realtime):
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback para o frontend
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Headers de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"

# Cache para assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
